<!DOCTYPE html>
<html>
<head>
    <title>Test Model WASM URLs</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .model-test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .testing { background-color: #fff3cd; border-color: #ffeaa7; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 200px; }
        .url-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🧪 Test Model WASM URLs</h1>
    
    <div class="url-list">
        <div>
            <h3>📦 Our Custom Models</h3>
            <button onclick="testCustomModels()">Test Custom Models</button>
            <div id="custom-results"></div>
        </div>
        <div>
            <h3>🔄 Alternative URLs</h3>
            <button onclick="testAlternativeUrls()">Test Alternative URLs</button>
            <div id="alt-results"></div>
        </div>
    </div>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        const customResults = document.getElementById('custom-results');
        const altResults = document.getElementById('alt-results');
        
        // Our current custom model WASM URLs (updated to GitHub)
        const customModels = [
            {
                model_id: "SmolLM2-360M-Instruct-q4f16_1-MLC",
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/SmolLM2-360M-Instruct-q4f16_1-ctx4k_cs1k-webgpu.wasm"
            },
            {
                model_id: "TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC", 
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/TinyLlama-1.1B-Chat-v0.4-q4f16_1-ctx4k_cs1k-webgpu.wasm"
            },
            {
                model_id: "SmolLM2-135M-Instruct-q0f16-MLC",
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/SmolLM2-135M-Instruct-q0f16-ctx4k_cs1k-webgpu.wasm"
            },
            {
                model_id: "Llama-3.2-1B-Instruct-q4f16_1-MLC",
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/Llama-3.2-1B-Instruct-q4f16_1-ctx4k_cs1k-webgpu.wasm"
            },
            {
                model_id: "Llama-3.2-1B-Instruct-q4f32_1-MLC",
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/Llama-3.2-1B-Instruct-q4f32_1-ctx4k_cs1k-webgpu.wasm"
            },
            {
                model_id: "Llama-3.2-3B-Instruct-q4f16_1-MLC",
                model_lib: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/Llama-3.2-3B-Instruct-q4f16_1-ctx4k_cs1k-webgpu.wasm"
            }
        ];
        
        // Alternative URL patterns to test
        const alternativePatterns = [
            {
                name: "GitHub Raw (v0_2_80) - CURRENT",
                baseUrl: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_80/"
            },
            {
                name: "GitHub Raw (v0_2_79)",
                baseUrl: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_79/"
            },
            {
                name: "GitHub Raw (v0_2_81)",
                baseUrl: "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_81/"
            },
            {
                name: "HuggingFace (v0_2_80) - BROKEN",
                baseUrl: "https://huggingface.co/mlc-ai/web-llm-models/resolve/main/v0_2_80/"
            }
        ];
        
        // Common WASM filenames to test
        const wasmFiles = [
            "TinyLlama-1.1B-Chat-v0.4-q4f16_1-ctx4k_cs1k-webgpu.wasm",
            "SmolLM2-360M-Instruct-q4f16_1-ctx4k_cs1k-webgpu.wasm",
            "Llama-3.2-1B-Instruct-q4f16_1-ctx4k_cs1k-webgpu.wasm"
        ];
        
        window.testCustomModels = async function() {
            customResults.innerHTML = '<h4>🔍 Testing Custom Models...</h4>';
            
            for (const model of customModels) {
                await testUrl(model.model_id, model.model_lib, customResults);
            }
        };
        
        window.testAlternativeUrls = async function() {
            altResults.innerHTML = '<h4>🔍 Testing Alternative URLs...</h4>';
            
            for (const pattern of alternativePatterns) {
                const patternDiv = document.createElement('div');
                patternDiv.style.margin = '10px 0';
                patternDiv.innerHTML = `<h5>📍 ${pattern.name}</h5>`;
                altResults.appendChild(patternDiv);
                
                for (const wasmFile of wasmFiles) {
                    const testUrl = pattern.baseUrl + wasmFile;
                    await testUrl(`${wasmFile} (${pattern.name})`, testUrl, patternDiv);
                }
            }
        };
        
        async function testUrl(modelId, url, container = results) {
            const testDiv = document.createElement('div');
            testDiv.className = 'model-test testing';
            testDiv.style.margin = '5px 0';
            testDiv.innerHTML = `
                <div><strong>🧪 ${modelId}</strong></div>
                <div><small><code>${url}</code></small></div>
                <div><em>Testing...</em></div>
            `;
            container.appendChild(testDiv);
            
            try {
                const startTime = Date.now();
                
                // Try HEAD request first
                const response = await fetch(url, { method: 'HEAD' });
                const endTime = Date.now();
                
                if (response.ok) {
                    testDiv.className = 'model-test success';
                    testDiv.innerHTML = `
                        <div><strong>✅ ${modelId}</strong></div>
                        <div><small><code>${url}</code></small></div>
                        <div><strong>Status:</strong> ${response.status} ${response.statusText}</div>
                        <div><strong>Time:</strong> ${endTime - startTime}ms</div>
                        <div><strong>Size:</strong> ${response.headers.get('content-length') ? (parseInt(response.headers.get('content-length')) / 1024 / 1024).toFixed(2) + ' MB' : 'Unknown'}</div>
                        <button onclick="testDownload('${modelId}', '${url}', this)">Test Full Download</button>
                    `;
                } else {
                    testDiv.className = 'model-test error';
                    testDiv.innerHTML = `
                        <div><strong>❌ ${modelId}</strong></div>
                        <div><small><code>${url}</code></small></div>
                        <div><strong>Error:</strong> ${response.status} ${response.statusText}</div>
                        <button onclick="testDownload('${modelId}', '${url}', this)">Try Full Download</button>
                    `;
                }
            } catch (error) {
                testDiv.className = 'model-test error';
                testDiv.innerHTML = `
                    <div><strong>❌ ${modelId}</strong></div>
                    <div><small><code>${url}</code></small></div>
                    <div><strong>Error:</strong> ${error.message}</div>
                    <button onclick="testDownload('${modelId}', '${url}', this)">Try Full Download Anyway</button>
                `;
            }
        }
        
        window.testDownload = async function(modelId, url, button) {
            if (button) button.disabled = true;
            if (button) button.textContent = 'Downloading...';
            
            try {
                const startTime = Date.now();
                const response = await fetch(url);
                const reader = response.body.getReader();
                let received = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    received += value.length;
                }
                
                const endTime = Date.now();
                
                alert(`✅ ${modelId} Downloaded Successfully!\n\nSize: ${(received / 1024 / 1024).toFixed(2)} MB\nTime: ${endTime - startTime}ms\nSpeed: ${(received / 1024 / 1024 / (endTime - startTime) * 1000).toFixed(2)} MB/s`);
                
            } catch (error) {
                alert(`❌ ${modelId} Download Failed!\n\nError: ${error.message}`);
            }
            
            if (button) {
                button.disabled = false;
                button.textContent = 'Test Full Download';
            }
        };
        
        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testCustomModels();
                testAlternativeUrls();
            }, 1000);
        });
    </script>
</body>
</html>
